<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CRM Inmobiliario</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #d4cec7;
    --surface: #ffffff;
    --surface2: #e8e5e0;
    --border: #7a7672;
    --border2: #9a9690;
    --text: #1a1916;
    --text2: #6b6760;
    --text3: #9e9b96;
    --accent: #1e5c8a;
    --accent-bg: #e8f0f7;
    --accent-border: #b8d0e8;
    --success: #1a7a52;
    --success-bg: #e6f4ee;
    --success-border: #a8d8c0;
    --warn: #1a4a8a;
    --orange: #c2410c;
    --orange-bg: #fff7ed;
    --orange-border: #fdba74;
    --purple: #6b21a8;
    --purple-bg: #f3e8ff;
    --purple-border: #c084fc;
    --warn-bg: #e8eef8;
    --warn-border: #9ab0d8;
    --danger: #8a1e1e;
    --danger-bg: #faeaea;
    --danger-border: #e8b0b0;
    --vip: #7a4800;
    --vip-bg: #fdf2e0;
    --vip-border: #e8c880;
    --radius: 10px;
    --radius-sm: 7px;
    --shadow: 0 1px 3px rgba(0,0,0,0.06);
    --shadow-md: 0 4px 16px rgba(0,0,0,0.08);
    --font: 'DM Sans', sans-serif;
    --mono: 'DM Mono', monospace;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--font); background: var(--bg); color: var(--text); font-size: 16px; line-height: 1.5; min-height: 100vh; }
  #app { max-width: 1100px; margin: 0 auto; padding: 20px 16px 60px; }

  /* ── MOBILE ── */
  @media (max-width: 600px) {
    #app { padding: 12px 10px 80px; }
    h1 { font-size: 18px; }
    .top-bar { flex-direction: column; align-items: flex-start; gap: 10px; }
    .top-bar-right { width: 100%; display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
    .top-bar-right .btn-primary { grid-column: 1 / -1; justify-content: center; }
    .filter-bar { flex-direction: column; }
    .filter-bar select { width: 100%; }
    .filter-panel { gap: 6px; }
    .filter-chip { font-size: 11px; padding: 4px 9px; }
    .crm-layout { flex-direction: column; }
    .sidebar { width: 100%; min-width: unset; position: static; max-height: unset; display: grid; grid-template-columns: 1fr 1fr; gap: 8px; padding: 10px; }
    .sidebar-title { grid-column: 1 / -1; }
    .sidebar-section { margin-bottom: 0; }
    .contact-list { gap: 8px; }
    .contact-card { padding: 10px 12px; }
    .contact-chips { gap: 4px; }
    .chip { font-size: 10px; padding: 2px 7px; }
    .main-content { padding-left: 0; }
    .grid-2 { grid-template-columns: 1fr; }
    .grid-3 { grid-template-columns: 1fr 1fr; }
    .form-actions { flex-direction: column; }
    .form-actions .btn { width: 100%; justify-content: center; }
    .detail-grid { grid-template-columns: 1fr; }
    .btn-sm { font-size: 11px; padding: 4px 8px; }
    .urgency-row { flex-wrap: wrap; }
    .multi-toggle { gap: 4px; }
    .toggle-btn { font-size: 11px; padding: 3px 8px; }
    .note-type-row { gap: 4px; }
    .note-type-btn { font-size: 10px; padding: 2px 7px; }
    .stats-grid { grid-template-columns: 1fr 1fr; }
    /* Tarjetas de contacto en móvil */
    .contact-card { flex-direction: column !important; }
    .contact-card > div:first-child { display: none; } /* ocultar barra lateral */
    /* Columna izquierda (nombre) ocupa ancho completo */
    .contact-card > div:nth-child(2) { width: 100% !important; min-width: unset !important; flex-direction: row !important; align-items: center !important; padding: 10px 12px !important; }
    /* Columna derecha (etiquetas) ocupa ancho completo */
    .contact-card > div:nth-child(3) { width: 100% !important; padding: 8px 12px !important; border-top: 1px solid rgba(255,255,255,.2); }
    /* Formulario en móvil */
    .form-sections > * { grid-template-columns: 1fr !important; }
    /* Toprow del formulario en 2 cols en lugar de 5 */
    .form-header { flex-wrap: wrap; gap: 8px; }
  }

  /* Login screen */
  .login-screen { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: var(--bg); padding: 20px; }
  .login-card { background: var(--surface); border: 1px solid var(--border2); border-radius: 14px; padding: 36px 32px; width: 100%; max-width: 360px; box-shadow: 0 8px 32px rgba(0,0,0,0.08); }
  .login-logo { font-size: 32px; margin-bottom: 6px; text-align: center; }
  .login-title { font-size: 20px; font-weight: 600; text-align: center; margin-bottom: 4px; }
  .login-subtitle { font-size: 13px; color: #555; text-align: center; margin-bottom: 24px; }
  .login-error { background: var(--danger-bg); color: var(--danger); border: 1px solid var(--danger-border); border-radius: var(--radius-sm); padding: 8px 12px; font-size: 13px; margin-bottom: 12px; display: none; }
  .login-footer { font-size: 11px; color: #555; text-align: center; margin-top: 16px; }

  /* Typography */
  h1 { font-size: 22px; font-weight: 600; letter-spacing: -0.3px; }
  h2 { font-size: 18px; font-weight: 600; letter-spacing: -0.2px; }
  h3 { font-size: 14px; font-weight: 500; }
  label { font-size: 12px; color: var(--text2); display: block; margin-bottom: 4px; }

  /* Inputs */
  input, select, textarea {
    width: 100%; font-family: var(--font); font-size: 13px; color: var(--text);
    background: #ffffff; border: 1.5px solid var(--border); border-radius: var(--radius-sm);
    padding: 8px 10px; outline: none; transition: border-color .15s;
  }
  input:focus, select:focus, textarea:focus { border-color: var(--accent); }
  textarea { resize: vertical; min-height: 80px; line-height: 1.6; }
  input[type=checkbox] { width: auto; margin: 0; cursor: pointer; accent-color: var(--accent); }

  /* Buttons */
  .btn { font-family: var(--font); font-size: 13px; font-weight: 500; cursor: pointer; border-radius: var(--radius-sm); padding: 7px 14px; transition: all .15s; border: 1px solid transparent; display: inline-flex; align-items: center; gap: 5px; }
  .btn-primary { background: var(--accent); color: #fff; border-color: var(--accent); }
  .btn-primary:hover { background: #174d78; }
  .btn-secondary { background: #fff; color: #222; border-color: var(--border); }
  .btn-secondary:hover { background: var(--surface2); }
  .btn-danger { background: var(--danger-bg); color: var(--danger); border-color: var(--danger-border); }
  .btn-danger:hover { background: #f0d0d0; }
  .btn-sm { font-size: 12px; padding: 5px 10px; }
  .btn-icon { padding: 6px 8px; }
  button:disabled { opacity: 0.5; cursor: default; }

  /* Card / Surface */
  .card { background: #ffffff; border: 1px solid #d4a574; border-radius: var(--radius); padding: 0 16px 14px 16px; box-shadow: 0 1px 4px rgba(0,0,0,.06); }
  .card.vip { border-color: var(--vip-border); background: linear-gradient(135deg, #fffdf7 0%, #fff 100%); }
  .section { background: #eff6ff; border: 1.5px solid #bfdbfe; border-radius: var(--radius); padding: 0 16px 14px 16px; }
  .section-title { font-size: 11px; font-weight: 700; color: #1e40af; text-transform: uppercase; letter-spacing: .07em; padding: 9px 16px; margin: 0 -16px 14px -16px; background: #dbeafe; border-bottom: 1px solid #93c5fd; border-radius: var(--radius) var(--radius) 0 0; }
  .section-form { background: #a8d5b8; border: 1px solid #6aad88; border-radius: var(--radius); padding: 0 16px 14px 16px; }
  .section-form .section-title { background: #2d5a3d; border-bottom-color: #2d5a3d; color: #ffffff; font-weight: 800; }
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
  .flex { display: flex; align-items: center; gap: 8px; }
  .flex-wrap { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; }
  .gap-4 { gap: 4px; }
  .gap-8 { gap: 8px; }
  .gap-12 { gap: 12px; }
  .gap-16 { gap: 16px; }
  .grid-stack { display: grid; gap: 12px; }
  .mt-8 { margin-top: 8px; }
  .mt-12 { margin-top: 12px; }
  .mt-16 { margin-top: 16px; }

  /* Chip */
  .chip { display: inline-flex; align-items: center; gap: 4px; font-size: 11px; padding: 2px 8px; border-radius: 20px; background: var(--surface2); color: var(--text); border: 1px solid var(--border); white-space: nowrap; font-weight: 500; }
  .chip-accent { background: var(--accent-bg); color: var(--accent); border-color: var(--accent-border); }
  .chip-success { background: var(--success-bg); color: var(--success); border-color: var(--success-border); }
  .chip-warn { background: var(--warn-bg); color: var(--warn); border-color: var(--warn-border); }
  .chip-danger { background: var(--danger-bg); color: var(--danger); border-color: var(--danger-border); }
  .chip-purple { background: var(--purple-bg); color: var(--purple); border-color: var(--purple-border); font-weight: 600; }
  .chip-orange { background: var(--orange-bg); color: var(--orange); border-color: var(--orange-border); font-weight: 600; }
  .chip-vip { background: var(--vip-bg); color: var(--vip); border-color: var(--vip-border); font-weight: 600; }
  .chip-remove { cursor: pointer; opacity: .5; font-size: 14px; line-height: 1; }
  .chip-remove:hover { opacity: 1; }

  /* Avatar */
  .avatar { width: 42px; height: 42px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 15px; font-weight: 600; color: #fff; flex-shrink: 0; position: relative; }
  .avatar-sm { width: 30px; height: 30px; font-size: 11px; }
  .vip-star { position: absolute; top: -3px; right: -3px; width: 15px; height: 15px; border-radius: 50%; background: #e6a817; font-size: 8px; display: flex; align-items: center; justify-content: center; color: #fff; font-weight: 700; }

  /* Urgency badges */
  .urgency-badge { font-size: 11px; font-weight: 500; padding: 2px 9px; border-radius: 20px; }

  /* Header */
  .top-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px; flex-wrap: wrap; gap: 10px; }
  .top-bar-right { display: flex; gap: 8px; flex-wrap: wrap; }
  .subtitle { font-size: 12px; color: #555; margin-top: 2px; }

  /* Filter bar */
  .filter-bar { display: flex; gap: 8px; margin-bottom: 10px; flex-wrap: wrap; }
  .filter-bar input { flex: 1; min-width: 180px; max-width: 400px; background: #dbeafe !important; border-color: #93c5fd !important; color: #1e40af !important; }
  .filter-bar select { max-width: 180px; background: #dbeafe !important; border-color: #93c5fd !important; color: #1e40af !important; font-weight: 700 !important; border-radius: 8px !important; }
  .filter-panel { background: #1d5fa8; border: none; border-radius: var(--radius); padding: 12px 16px; margin-bottom: 12px; display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
  .filter-panel-title { font-size: 11px; font-weight: 800; color: #fff; text-transform: uppercase; letter-spacing: .07em; width: 100%; margin-bottom: 4px; }
  .filter-chip { font-family: var(--font); font-size: 13px; font-weight: 700; padding: 6px 14px; border-radius: 20px; cursor: pointer; border: none; background: #ffffff; color: #1a3a6b; transition: all .15s; white-space: nowrap; }
  .filter-chip:hover { border-color: var(--accent-border); color: var(--accent); background: var(--accent-bg); }
  .filter-chip.active { background: #f59e0b; color: #fff; border-color: #d97706; font-weight: 700; }
  .filter-chip.active-vip { background: #f59e0b; color: #fff; border-color: #d97706; font-weight: 700; }
  .filter-chip.active-warn { background: #f59e0b; color: #fff; border-color: #d97706; font-weight: 700; }
  .filter-select { font-family: var(--font); font-size: 13px; font-weight: 700; padding: 6px 12px; border-radius: 20px; border: none; background: #ffffff; color: #1a3a6b; cursor: pointer; transition: all .15s; }
  .filter-select.active { border-color: var(--accent-border); color: var(--accent); background: var(--accent-bg); font-weight: 600; }
  .filter-clear { font-family: var(--font); font-size: 12px; color: var(--danger); background: none; border: none; cursor: pointer; padding: 5px 8px; border-radius: 20px; margin-left: 4px; }
  .filter-clear:hover { background: var(--danger-bg); }

  /* Contact list */
  .contact-list { display: grid; gap: 8px; }
  .contact-card { cursor: pointer; transition: box-shadow .15s, transform .1s; overflow: hidden; }
  .contact-card:hover { box-shadow: var(--shadow-md); transform: translateY(-1px); }
  .contact-card-inner { display: grid; grid-template-columns: auto 1fr; gap: 12px; align-items: start; min-width: 0; }
  .contact-info-row { display: flex; flex-wrap: wrap; gap: 2px 14px; font-size: 12px; color: var(--text2); margin: 3px 0 6px; min-width: 0; }
  .contact-chips { display: flex; flex-wrap: wrap; gap: 4px; }

  /* Detail view */
  .detail-header { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; margin-bottom: 14px; }
  .detail-header-right { margin-left: auto; display: flex; gap: 8px; }
  .detail-card { background: #dbeafe; border: 1.5px solid #93c5fd; border-radius: var(--radius); padding: 12px 14px; }
  .detail-card-title { font-size: 11px; font-weight: 800; color: #222; text-transform: uppercase; letter-spacing: .07em; margin-bottom: 8px; }
  .detail-row { display: flex; gap: 10px; font-size: 13px; padding: 4px 0; border-bottom: 1px solid var(--border); }
  .detail-row:last-child { border-bottom: none; }
  .detail-label { font-size: 12px; color: #1e40af; min-width: 110px; flex-shrink: 0; padding-top: 2px; font-weight: 600; }
  @media (max-width: 600px) { .detail-panel-grid { grid-template-columns: 1fr !important; } }
  .actions-row { display: flex; flex-wrap: wrap; gap: 8px; }

  /* Form */
  .form-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; flex-wrap: wrap; gap: 8px; }
  .form-sections { display: grid; gap: 14px; background: #8ec4a0; padding: 8px; border-radius: var(--radius); }
  .field { display: grid; gap: 4px; }
  .form-footer { display: flex; justify-content: flex-end; gap: 8px; margin-top: 16px; padding-top: 16px; border-top: 1px solid var(--border); }

  /* Multi-toggle */
  .multi-toggle { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 0; }
  .toggle-btn { font-family: var(--font); font-size: 12px; padding: 5px 13px; border-radius: 20px; cursor: pointer; border: 1.5px solid var(--border2); background: var(--surface); color: var(--text); transition: all .15s; font-weight: 500; }
  .toggle-btn:hover { border-color: var(--accent-border); color: var(--accent); background: var(--accent-bg); }
  .toggle-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); font-weight: 700; box-shadow: 0 1px 4px rgba(24,95,165,.3); }
  .field > label { font-size: 11px; font-weight: 700; color: var(--text); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 6px; display: block; }

  /* Urgency selector */
  .urgency-row { display: flex; gap: 6px; }
  .urgency-btn { flex: 1; padding: 6px 4px; font-family: var(--font); font-size: 12px; border-radius: var(--radius-sm); cursor: pointer; border: 1px solid var(--border); background: var(--surface2); color: var(--text); text-align: center; transition: all .15s; }

  /* Tag input */
  .tag-input-wrap { border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 5px 8px; display: flex; flex-wrap: wrap; gap: 4px; min-height: 38px; align-items: center; background: var(--surface); cursor: text; transition: border-color .15s; }
  .tag-input-wrap:focus-within { border-color: var(--accent); }
  .tag-input-wrap input { border: none; outline: none; background: transparent; font-size: 13px; flex: 1; min-width: 80px; padding: 0; color: var(--text); font-family: var(--font); }
  .tag-suggs { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 4px; }

  /* Stats */
  .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 10px; margin-bottom: 14px; }
  .stat-card { background: var(--surface); border: 1px solid var(--border2); border-radius: var(--radius); padding: 14px 16px; }
  .stat-label { font-size: 12px; color: var(--text2); margin-bottom: 4px; }
  .stat-value { font-size: 26px; font-weight: 600; line-height: 1; }
  .stat-sub { font-size: 11px; color: #555; margin-top: 4px; }
  .bar-row { display: flex; align-items: center; gap: 8px; }
  .bar-label { font-size: 12px; color: var(--text2); min-width: 80px; }
  .bar-track { flex: 1; height: 8px; border-radius: 4px; background: var(--surface2); overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 4px; transition: width .4s; }
  .bar-num { font-size: 12px; font-weight: 500; min-width: 20px; text-align: right; }

  /* Merge panel */
  .merge-panel { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; margin-bottom: 14px; }
  .merge-list { max-height: 200px; overflow-y: auto; display: grid; gap: 6px; margin: 10px 0; }
  .merge-item { padding: 8px 12px; border-radius: var(--radius-sm); border: 1px solid var(--border); background: var(--surface); cursor: pointer; display: flex; align-items: center; gap: 10px; transition: all .12s; }
  .merge-item:hover, .merge-item.selected { border-color: var(--accent-border); background: var(--accent-bg); }
  .merge-item-info { min-width: 0; }
  .merge-item-name { font-size: 13px; font-weight: 500; }
  .merge-item-sub { font-size: 11px; color: var(--text2); }

  /* Files */
  .files-grid { display: flex; flex-wrap: wrap; gap: 8px; }
  .file-thumb { position: relative; border: 1px solid var(--border); border-radius: var(--radius-sm); overflow: hidden; }
  .file-thumb img { width: 80px; height: 70px; object-fit: cover; display: block; cursor: pointer; }
  .file-doc { padding: 8px 12px; display: flex; align-items: center; gap: 8px; cursor: pointer; min-width: 130px; }
  .file-doc:hover { background: var(--surface2); }
  .file-name { font-size: 11px; font-weight: 500; max-width: 110px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .file-size { font-size: 10px; color: #555; }
  .file-del { position: absolute; top: 3px; right: 3px; width: 18px; height: 18px; border-radius: 50%; background: rgba(0,0,0,.55); color: #fff; border: none; cursor: pointer; font-size: 11px; display: flex; align-items: center; justify-content: center; line-height: 1; }

  /* Toast */
  .toast { padding: 8px 16px; border-radius: var(--radius-sm); font-size: 13px; font-weight: 500; margin-bottom: 12px; border: 1px solid; }
  .toast-success { background: var(--success-bg); color: var(--success); border-color: var(--success-border); }
  .toast-danger { background: var(--danger-bg); color: var(--danger); border-color: var(--danger-border); }

  /* Empty state */
  .empty { text-align: center; padding: 3rem 1rem; color: #555; }
  .empty strong { display: block; font-size: 15px; color: var(--text2); margin-bottom: 6px; }

  /* Confirm inline */
  .confirm-row { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; padding: 8px 12px; background: var(--danger-bg); border: 1px solid var(--danger-border); border-radius: var(--radius-sm); margin-top: 8px; }
  .confirm-row span { font-size: 13px; color: var(--danger); flex: 1; }

  /* Nav tabs */
  .nav-tabs { display: flex; gap: 4px; margin-bottom: 18px; border-bottom: 1px solid var(--border); padding-bottom: 0; }
  .nav-tab { font-family: var(--font); font-size: 13px; font-weight: 500; padding: 8px 14px; cursor: pointer; border: none; background: none; color: var(--text2); border-bottom: 2px solid transparent; margin-bottom: -1px; transition: all .15s; }
  .nav-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
  .nav-tab:hover:not(.active) { color: var(--text); }

  /* Layout con sidebar */
  .crm-layout { display: flex; gap: 0; align-items: flex-start; }
  .sidebar { width: 220px; min-width: 220px; background: #dbeafe; border: 1.5px solid #93c5fd; border-radius: var(--radius); padding: 14px 12px; position: sticky; top: 20px; max-height: calc(100vh - 40px); overflow-y: auto; }
  .sidebar-title { font-size: 10px; font-weight: 700; color: #555; text-transform: uppercase; letter-spacing: .08em; margin-bottom: 10px; }
  .sidebar-section { margin-bottom: 14px; }
  .sidebar-section-label { font-size: 11px; font-weight: 800; color: #1a3a6b; margin-bottom: 6px; display: block; text-transform: uppercase; letter-spacing: .05em; }
  .sidebar-chip { display: block; width: 100%; text-align: left; font-family: var(--font); font-size: 12px; font-weight: 500; padding: 5px 10px; border-radius: var(--radius-sm); cursor: pointer; border: 1px solid transparent; background: transparent; color: var(--text); transition: all .12s; margin-bottom: 2px; }
  .sidebar-chip:hover { background: var(--surface2); color: var(--text); }
  .sidebar-chip.active { background: var(--accent); color: #fff; font-weight: 600; }
  .sidebar-chip.active-vip { background: var(--vip-bg); color: var(--vip); border-color: var(--vip-border); font-weight: 700; }
  .sidebar-chip.active-warn { background: var(--warn-bg); color: var(--warn); border-color: var(--warn-border); font-weight: 600; }
  .sidebar-select { width: 100%; font-family: var(--font); font-size: 13px; padding: 6px 10px; border-radius: var(--radius-sm); border: 1.5px solid #93c5fd; background: #ffffff; color: #1e40af; cursor: pointer; margin-bottom: 4px; font-weight: 700; }
  .sidebar-select.active { border-color: var(--accent-border); color: var(--accent); background: var(--accent-bg); font-weight: 600; }
  .sidebar-divider { border: none; border-top: 1px solid var(--border); margin: 10px 0; }
  .sidebar-clear { width: 100%; font-family: var(--font); font-size: 11px; color: #c0392b; background: none; border: none; cursor: pointer; padding: 4px; border-radius: var(--radius-sm); text-align: left; font-weight: 600; }

    };

  setCredentials(user, pass) {
    localStorage.setItem('crm_auth_user', user);
    localStorage.setItem('crm_auth_pass', pass);
  },
  isLoggedIn() {
    // Sesión guardada con "recordarme"

    if (sessionStorage.getItem('crm_session') === 'ok') return true;

      else sessionStorage.setItem('crm_session', 'ok');

    }

  },

};

// URL de tu Web App — se guarda en localStorage al configurar
let SHEETS_URL = LS.get('crm_sheets_url') || '';

// Detectar si estamos corriendo DENTRO de Apps Script
const IS_APPS_SCRIPT = typeof google !== 'undefined' && typeof google.script !== 'undefined';

// Si estamos en Apps Script, la URL somos nosotros mismos
if (IS_APPS_SCRIPT) SHEETS_URL = 'self';

const API = {
  async call(action, body={}) {
    // Modo Apps Script: usa google.script.run (sin fetch, sin CORS)
    if (IS_APPS_SCRIPT) {
      return new Promise((resolve) => {
        google.script.run
          .withSuccessHandler(r => resolve(r && r.ok ? r.data : null))
          .withFailureHandler(() => resolve(null))
          .handleApiCall(JSON.stringify({ action, ...body }));
      });
    }
    // Modo externo: fetch con GET para evitar CORS
    if (!SHEETS_URL) return null;
    try {
      const params = new URLSearchParams({ action, ...Object.fromEntries(
        Object.entries(body).map(([k,v]) => [k, typeof v === 'object' ? JSON.stringify(v) : v])
      )});
      const res = await fetch(SHEETS_URL + '?' + params.toString(), {
        method: 'GET',
        redirect: 'follow',
      });
      const json = await res.json();
      return json.ok ? json.data : null;
    } catch(e) {
      console.warn('Sheets API error:', e);
      return null;
    }
  },
  async getAll()          { return await this.call('getAll'); },
  async saveContact(c)    { return await this.call('saveContact',   { contact: c }); },
  async deleteContact(id) { return await this.call('deleteContact', { id }); },
  async saveNote(note)    { return await this.call('saveNote',      { note }); },
  async deleteNote(nId)   { return await this.call('deleteNote',    { noteId: nId }); },
};

// ─── CSV EXPORT ───────────────────────────────────────────────────────────────
function exportCSV(contacts) {
  const cols = ['Nombre','Teléfono','Email','WhatsApp','VIP','Urgencia','Pres.Min','Pres.Max','Hipoteca','Zonas','Tipos','Dormitorios','Piscina','Etiquetas','Inversión','Agente','Notas','Último contacto','Creado'];
  const esc = v => '"' + (v||'').toString().replace(/"/g,'""') + '"';
  const rows = contacts.map(c => [
    c.name,c.phone,c.email,c.whatsapp,c.isVIP?'Sí':'No',
    URGENCY[c.urgency]?.l||'',c.budgetMin,c.budgetMax,
    c.needsMortgage?'Sí':'No',(c.searchZones||[]).join('; '),
    (c.propertyTypes||[]).join('; '),c.bedroomsMin||'',
    c.wantsPool?'Sí':'No',(c.tags||[]).join('; '),
    c.investmentType||'',c.createdBy||'',
    Array.isArray(c.notes)?(c.notes.map(n=>n.date+' ['+n.v+']: '+n.text).join(' | ')):((c.notes||'').replace(/\n/g,' ')),
    c.lastContact||'',(c.createdAt||'').split('T')[0]
  ].map(esc));
  const csv = [cols.map(esc).join(','), ...rows.map(r=>r.join(','))].join('\n');
  const blob = new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href=url; a.download='contactos_crm.csv'; a.click();
  URL.revokeObjectURL(url);
}

// ─── ACTIONS ──────────────────────────────────────────────────────────────────
async function saveContact(c) {
  const exists = state.contacts.find(x=>x.id===c.id);
  let contacts;
  if (exists) contacts = state.contacts.map(x=>x.id===c.id?c:x);
  else contacts = [c, ...state.contacts];
  saveContacts(contacts);
  setState({contacts, view: state.detailContact ? 'detail' : 'list', editContact:null, detailContact: exists ? c : state.detailContact});
  // Sync a Sheets en segundo plano
  if (SHEETS_URL) {
    const res = await API.saveContact(c);
    showToast((exists ? 'Actualizado' : 'Guardado') + (res ? ' ✓ (Sheets)' : ' ✓ (local)'));
  } else {
    showToast(exists ? 'Contacto actualizado ✓' : 'Contacto añadido ✓');
  }
}

async function deleteContact(id) {
  const contacts = state.contacts.filter(c=>c.id!==id);
  saveContacts(contacts);
  setState({contacts, view:'list', detailContact:null, confirmDelete:null});
  if (SHEETS_URL) await API.deleteContact(id);
  showToast('Contacto eliminado','danger');
}

function mergeContacts(base, other) {
  const merged = {
    ...base,
    phone: base.phone||other.phone,
    email: base.email||other.email,
    whatsapp: base.whatsapp||other.whatsapp,
    contactMethods: [...new Set([...base.contactMethods,...other.contactMethods])],
    isVIP: base.isVIP||other.isVIP,
    tags: [...new Set([...base.tags,...other.tags])],
    budgetMin: base.budgetMin||other.budgetMin,
    budgetMax: base.budgetMax&&other.budgetMax ? String(Math.max(Number(base.budgetMax),Number(other.budgetMax))) : base.budgetMax||other.budgetMax,
    searchZones: [...new Set([...base.searchZones,...other.searchZones])],
    urgency: Math.max(base.urgency, other.urgency),
    needsMortgage: base.needsMortgage||other.needsMortgage,
    bedroomsMin: base.bedroomsMin||other.bedroomsMin,
    wantsPool: base.wantsPool||other.wantsPool,
    propertyTypes: [...new Set([...base.propertyTypes,...other.propertyTypes])],
    investmentType: base.investmentType||other.investmentType,
    createdBy: base.createdBy||other.createdBy,
    notes: [base.notes, other.notes].filter(Boolean).join('\n---\n'),
  };
  const contacts = state.contacts.filter(c=>c.id!==other.id).map(c=>c.id===merged.id?merged:c);
  saveContacts(contacts);
  showToast('Contactos fusionados ✓');
  setState({contacts, detailContact:merged, showMerge:false, mergeSelected:null, mergeSearch:''});
}

// ─── FILTERED CONTACTS ────────────────────────────────────────────────────────
function getFiltered() {
  let list = [...state.contacts];
  const q = state.search.toLowerCase();
  if (q) list = list.filter(c =>
    c.name?.toLowerCase().includes(q) || c.email?.toLowerCase().includes(q) ||
    c.phone?.includes(q) || c.tags?.some(t=>t.toLowerCase().includes(q)) ||
    c.searchZones?.some(z=>z.toLowerCase().includes(q)) || c.createdBy?.toLowerCase().includes(q)
  );
  const f = state.filters;
  if (f.isVIP) list = list.filter(c=>c.isVIP);
  if (f.needsMortgage) list = list.filter(c=>c.needsMortgage);
  if (f.wantsPool) list = list.filter(c=>c.wantsPool);
  if (f.urgencyMin>0) list = list.filter(c=>c.urgency>=f.urgencyMin);
  if (f.zone) {
    if (f.zone === 'Toda la Costa') { list = list.filter(c => c.searchZones?.some(z => COAST_ZONES.includes(z) || z === 'Toda la Costa')); }
    else { list = list.filter(c => c.searchZones?.some(z => z.toLowerCase().includes(f.zone.toLowerCase()) || z === 'Toda la Costa')); }
  }
  if (f.tag) list = list.filter(c=>c.tags?.some(t=>t.toLowerCase()===f.tag.toLowerCase()));
  if (f.budgetMax) list = list.filter(c=>!c.budgetMax || Number(c.budgetMax) <= Number(f.budgetMax));
  if (f.hasEfectivo) list = list.filter(c=>c.tags?.includes('Tiene efectivo'));
  if (f.hasNIE) list = list.filter(c=>c.tags?.includes('Tiene NIE'));
  if (f.noNIE) list = list.filter(c=>c.tags?.includes('Sin NIE'));
  if (f.wantsPool) list = list.filter(c=>c.tags?.includes('Piscina') || c.wantsPool);
  if (f.bedroomsMin) list = list.filter(c=>c.bedroomsMin && Number(c.bedroomsMin) >= Number(f.bedroomsMin));
  if (f.hasOkupa) list = list.filter(c=>c.tags?.includes('Okupa OK'));
  if (f.hablaIngles) list = list.filter(c=>c.tags?.includes('Habla inglés'));
  if (f.hasPremium) list = list.filter(c=>c.tags?.includes('Premium'));
  list.sort((a,b) => {
    if (state.sort==='date_desc') return new Date(b.createdAt)-new Date(a.createdAt);
    if (state.sort==='name') return (a.name||'').localeCompare(b.name||'','es');
    if (state.sort==='urgency') return b.urgency-a.urgency;
    if (state.sort==='budget') return (Number(b.budgetMax)||0)-(Number(a.budgetMax)||0);
    return 0;
  });
  return list;
}

// ─── HTML HELPERS ─────────────────────────────────────────────────────────────
const h = (tag,attrs,...children) => {
  const el = document.createElement(tag);
  for (const [k,v] of Object.entries(attrs||{})) {
    if (k==='style'&&typeof v==='object') Object.assign(el.style, v);
    else if (k.startsWith('on')&&typeof v==='function') el.addEventListener(k.slice(2).toLowerCase(), v);
    else if (k==='html') el.innerHTML = v;
    else el.setAttribute(k, v);
  }
  for (const c of children) { if (c==null||c===false) continue; if (typeof c==='string'||typeof c==='number') el.append(document.createTextNode(c)); else if (c instanceof Node) el.append(c); }
  return el;
};

function chip(text, cls, onRemove) {
  const c = h('span',{class:'chip'+(cls?' '+cls:'')}, text);
  if (onRemove) {
    const x = h('span',{class:'chip-remove',html:'&times;'});
    x.addEventListener('click',e=>{e.stopPropagation();onRemove();});
    c.append(x);
  }
  return c;
}

// ─── TAG INPUT ────────────────────────────────────────────────────────────────
function makeTagInput(values, onChange, suggestions, placeholder) {
  let vals = [...values];
  const wrap = h('div',{class:'tag-input-wrap'});
  const input = h('input',{type:'text',placeholder:vals.length===0?(placeholder||'Añadir...'):'',style:{border:'none',outline:'none',background:'transparent',fontSize:'13px',flex:'1',minWidth:'80px',padding:'0',fontFamily:"'DM Sans',sans-serif"}});
  const suggs = h('div',{class:'tag-suggs'});
  const el = h('div',{},wrap,suggs);

  function refresh() {
    wrap.innerHTML='';
    vals.forEach(v => {
      const c = chip(v,'',()=>{vals=vals.filter(x=>x!==v);onChange(vals);refresh();});
      wrap.append(c);
    });
    wrap.append(input);
    input.placeholder = vals.length===0?(placeholder||'Añadir...'):'';
    // suggestions
    suggs.innerHTML='';
    const shown = (suggestions||[]).filter(s=>!vals.includes(s)&&s.toLowerCase().includes(input.value.toLowerCase())).slice(0,7);
    shown.forEach(s=>{
      const btn = h('button',{class:'toggle-btn active',style:{fontSize:'11px',padding:'2px 8px',cursor:'pointer'}}, '+ '+s);
      btn.addEventListener('click',()=>{if(!vals.includes(s))vals=[...vals,s];onChange(vals);refresh();});
      suggs.append(btn);
    });
  }
  function add(v) { const t=v.trim(); if(t&&!vals.includes(t)){vals=[...vals,t];onChange(vals);} input.value=''; refresh(); }
  input.addEventListener('keydown',e=>{
    if(e.key==='Enter'||e.key===','){e.preventDefault();add(input.value);}
    else if(e.key==='Backspace'&&!input.value&&vals.length){vals=vals.slice(0,-1);onChange(vals);refresh();}
  });
  input.addEventListener('blur',()=>{if(input.value)add(input.value);});
  input.addEventListener('input',refresh);
  wrap.addEventListener('click',e=>{if(e.target===wrap)input.focus();});
  refresh();
  return el;
}

// ─── MULTI TOGGLE ────────────────────────────────────────────────────────────
function makeToggleRow(options, values, onChange, defaultColor, compact) {
  let vals = [...values];
  const colorMap = {
    'chip-vip':     {inact:{bg:'var(--vip-bg)',    border:'var(--vip-border)',    color:'var(--vip)'},    act:{bg:'var(--vip)',    border:'var(--vip)',    color:'#fff'}},
    'chip-success': {inact:{bg:'var(--success-bg)', border:'var(--success-border)',color:'var(--success)'}, act:{bg:'var(--success)', border:'var(--success)', color:'#fff'}},
    'chip-warn':    {inact:{bg:'var(--warn-bg)',    border:'var(--warn-border)',   color:'var(--warn)'},    act:{bg:'var(--warn)',    border:'var(--warn)',    color:'#fff'}},
    'chip-accent':  {inact:{bg:'var(--accent-bg)', border:'var(--accent-border)', color:'var(--accent)'},  act:{bg:'var(--accent)',  border:'var(--accent)',  color:'#fff'}},
    'chip-purple':  {inact:{bg:'var(--purple-bg)', border:'var(--purple-border)', color:'var(--purple)'},  act:{bg:'var(--purple)',  border:'var(--purple)',  color:'#fff'}},
    'chip-orange':  {inact:{bg:'var(--orange-bg)', border:'var(--orange-border)', color:'var(--orange)'},  act:{bg:'var(--orange)',  border:'var(--orange)',  color:'#fff'}},
  };
  const row = h('div',{class:'multi-toggle'});
  function refresh() {
    row.innerHTML='';
    options.forEach(o=>{
      const isActive = vals.includes(o);
      const btn = h('button',{class:'toggle-btn'+(isActive?' active':'')},o);
      if(compact) { btn.style.fontSize='11px'; btn.style.padding='3px 8px'; }
      const tagColor = (typeof TAG_COLORS !== 'undefined' && TAG_COLORS[o]) || defaultColor;
      if(tagColor && colorMap[tagColor]) {
        const cm = isActive ? colorMap[tagColor].act : colorMap[tagColor].inact;
        btn.style.background  = cm.bg;
        btn.style.borderColor = cm.border;
        btn.style.color       = cm.color;
        btn.style.fontWeight  = isActive ? '700' : '500';
      }
      btn.addEventListener('click',()=>{vals=vals.includes(o)?vals.filter(x=>x!==o):[...vals,o];onChange(vals);refresh();});
      row.append(btn);
    });
  }
  refresh();
  return row;
}

function makeMultiToggle(options, values, onChange, label, defaultColor) {
  let vals = [...values];
  const el = h('div',{class:'grid-stack',style:{gap:'6px'}});
  if(label) el.append(h('label',{},label));
  const row = h('div',{class:'multi-toggle'});
  el.append(row);
  const colorMap = {
    'chip-vip':     {inact:{bg:'var(--vip-bg)',    border:'var(--vip-border)',    color:'var(--vip)'},    act:{bg:'var(--vip)',    border:'var(--vip)',    color:'#fff'}},
    'chip-success': {inact:{bg:'var(--success-bg)', border:'var(--success-border)',color:'var(--success)'}, act:{bg:'var(--success)', border:'var(--success)', color:'#fff'}},
    'chip-warn':    {inact:{bg:'var(--warn-bg)',    border:'var(--warn-border)',   color:'var(--warn)'},    act:{bg:'var(--warn)',    border:'var(--warn)',    color:'#fff'}},
    'chip-accent':  {inact:{bg:'var(--accent-bg)', border:'var(--accent-border)', color:'var(--accent)'},  act:{bg:'var(--accent)',  border:'var(--accent)',  color:'#fff'}},
    'chip-purple':  {inact:{bg:'var(--purple-bg)', border:'var(--purple-border)', color:'var(--purple)'},  act:{bg:'var(--purple)',  border:'var(--purple)',  color:'#fff'}},
    'chip-orange':  {inact:{bg:'var(--orange-bg)', border:'var(--orange-border)', color:'var(--orange)'},  act:{bg:'var(--orange)',  border:'var(--orange)',  color:'#fff'}},
  };
  function refresh() {
    row.innerHTML='';
    options.forEach(o=>{
      const isActive = vals.includes(o);
      const btn = h('button',{class:'toggle-btn'+(isActive?' active':'')},o);
      const tagColor = (typeof TAG_COLORS !== 'undefined' && TAG_COLORS[o]) || defaultColor;
      if(tagColor && colorMap[tagColor]) {
        const cm = isActive ? colorMap[tagColor].act : colorMap[tagColor].inact;
        btn.style.background   = cm.bg;
        btn.style.borderColor  = cm.border;
        btn.style.color        = cm.color;
        btn.style.fontWeight   = isActive ? '700' : '500';
      }
      btn.addEventListener('click',()=>{vals=vals.includes(o)?vals.filter(x=>x!==o):[...vals,o];onChange(vals);refresh();});
      row.append(btn);
    });
  }
  refresh();
  return el;
}

  const metaStack = h('div',{style:{display:'flex',flexDirection:'column',gap:'5px',flexShrink:'0',paddingTop:'2px',minWidth:'90px'}});
  if(urg) {
    metaStack.append(h('span',{style:{
      fontSize:'12px',fontWeight:'700',padding:'3px 10px',borderRadius:'20px',
      background:urgBg,color:'#fff',whiteSpace:'nowrap',textAlign:'center'
    }},urg.l));

  if(c.lastContact) metaStack.append(h('span',{style:{fontSize:'11px',color:'#555',whiteSpace:'nowrap'}},'📅 '+fmtDate(c.lastContact)));
  rightCol.append(metaStack);


  // Etiquetas — más grandes
  const chips2 = h('div',{style:{display:'flex',flexWrap:'wrap',gap:'5px'}});
  const ZGREEN=['Alicante','San Vicente','El Campello','San Juan Pueblo','Playa San Juan','Pau 5'];
  const ZBURDO=['Algorfa','Los Montesinos','Elche','Crevillente','Almoradí','Elda','Alcoy','Benidorm','Jávea','Calpe','Villajoyosa'];

  const bigChip=(label,cls)=>{
    const el=chip(label,cls);
    el.style.fontSize='13px';
    el.style.padding='4px 12px';
    el.style.fontWeight='600';
    return el;
  };

  (c.searchZones||[]).forEach(z=>{

    const zc=bigChip(z,zColor);

  if(c.bedroomsMin) chips2.append(bigChip(c.bedroomsMin+'+ hab.','chip-accent'));
  if(c.needsMortgage) chips2.append(bigChip('Hipoteca','chip-warn'));
  if(c.investmentType) chips2.append(bigChip(c.investmentType,TAG_COLORS[c.investmentType]||'chip-accent'));

  (c.tags||[]).forEach(t=>{

    tc.style.cursor='pointer';

    chips2.append(tc);
  });

  const today=new Date().toISOString().split('T')[0];

  const chipsWrap = h('div',{style:{flex:'1',minWidth:'0',display:'flex',flexWrap:'wrap',gap:'5px',alignContent:'flex-start'}});
  chips2.childNodes.forEach ? Array.from(chips2.childNodes).forEach(n=>chipsWrap.append(n)) : chipsWrap.append(chips2);

  card.append(rightCol);
  return card;
}

// NOTES HISTORY SECTION
function renderNotesSection(c) {
  const notes = Array.isArray(c.notes) ? [...c.notes] : (c.notes ? [{v:'otro',text:c.notes,date:c.lastContact||new Date().toISOString().split('T')[0]}] : []);
  const wrap = h('div',{class:'grid-stack',style:{gap:'4px'}});

  // Lista de notas existentes (más recientes primero)
  const sorted = [...notes].sort((a,b)=>b.date>a.date?1:-1);
  if(sorted.length===0) {
    wrap.append(h('div',{style:{fontSize:'12px',color:'var(--text3)',fontStyle:'italic'}},'Sin notas todavía. Añadí la primera abajo.'));
  } else {
    sorted.forEach((n,origIdx)=>{
      const nt = NOTE_TYPES.find(t=>t.v===n.v)||NOTE_TYPES[5];
      const entry = h('div',{class:'note-entry'});
      entry.style.borderLeftColor = n.v==='llamada'?'var(--accent)':n.v==='reunion'||n.v==='visita'?'var(--warn)':n.v==='whatsapp'?'var(--success)':'var(--border)';
      const meta = h('div',{class:'note-meta'});
      meta.append(h('span',{class:'chip '+nt.c,style:{fontSize:'10px',padding:'1px 7px'}},nt.l));
      meta.append(h('span',{class:'note-date'},n.date));
      if(n.createdBy) meta.append(h('span',{style:{fontSize:'11px',color:'var(--text3)'}},n.createdBy));
      // Botón eliminar nota
      const delBtn = h('button',{
        style:{marginLeft:'auto',fontSize:'11px',color:'var(--text3)',border:'none',background:'none',cursor:'pointer',padding:'0 2px'},
        onClick:()=>{
          const updated={...c,notes:notes.filter((_,i)=>i!==notes.indexOf(n))};
          saveContact(updated);
        }
      },'✕');
      meta.append(delBtn);
      entry.append(meta);
      entry.append(h('div',{class:'note-text'},n.text));
      wrap.append(entry);
    });
  }

  // Formulario para nueva nota
  let newType='otro', newText='';
  const form = h('div',{class:'note-add-form'});

  // Selector de tipo
  const typeRow = h('div',{class:'note-type-row'});
  NOTE_TYPES.forEach(nt=>{
    const btn = h('button',{class:'note-type-btn'+(newType===nt.v?' active':'')},nt.l);
    btn.addEventListener('click',()=>{
      newType=nt.v;
      typeRow.querySelectorAll('.note-type-btn').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
    });
    typeRow.append(btn);
  });
  // Activar "otro" por defecto visualmente
  typeRow.querySelector('.note-type-btn:last-child').classList.add('active');

  const textarea = h('textarea',{placeholder:'Escribí tu nota aquí...',style:{minHeight:'70px',fontSize:'13px',resize:'vertical'}});
  textarea.addEventListener('input',e=>newText=e.target.value);

  const addRow2 = h('div',{style:{display:'flex',justifyContent:'flex-end'}});
  const addBtn = h('button',{class:'btn btn-primary btn-sm',onClick:()=>{
    if(!newText.trim()) return;
    const newNote = {
      v: newType,
      text: newText.trim(),
      date: new Date().toISOString().split('T')[0],
      createdBy: c.createdBy||''
    };
    const updated={...c,notes:[...notes,newNote]};
    saveContact(updated);
  }},'Guardar nota');
  addRow2.append(addBtn);

  form.append(typeRow, textarea, addRow2);
  wrap.append(form);

  return sectionEl('Historial de notas', wrap);
}

// REMINDERS SECTION
function renderRemindersSection(c) {
  const reminders = c.reminders || [];
  const today = new Date().toISOString().split('T')[0];
  const wrap = h('div',{class:'grid-stack',style:{gap:'8px'}});

  // Lista de recordatorios existentes
  if(reminders.length>0) {
    reminders.forEach((r,i)=>{
      const isPast = r.date < today;
      const isToday = r.date === today;
      const rowStyle = {
        display:'flex', alignItems:'center', gap:'8px',
        padding:'8px 10px', borderRadius:'var(--radius-sm)',
        border:'1px solid '+(isToday?'var(--warn-border)':isPast?'var(--danger-border)':'var(--border)'),
        background: isToday?'var(--warn-bg)':isPast?'var(--danger-bg)':'var(--surface)',
        fontSize:'13px'
      };
      const icon = isToday?'🔔':isPast?'⚠️':'🗓️';
      const dateLabel = isToday?'HOY':isPast?r.date+' (pasado)':r.date;
      const row = h('div',{style:rowStyle},
        h('span',{},icon),
        h('span',{style:{flex:'1'}},r.text),
        h('span',{style:{fontSize:'11px',color:isToday?'var(--warn)':isPast?'var(--danger)':'var(--text3)',fontWeight:isToday||isPast?'600':'400'}},dateLabel),
        h('button',{
          class:'btn btn-sm',
          style:{padding:'2px 8px',fontSize:'11px',color:'var(--text3)',border:'1px solid var(--border)',background:'var(--surface)'},
          onClick:()=>{
            const updated={...c,reminders:reminders.filter((_,j)=>j!==i)};
            saveContact(updated);
          }
        },'✕')
      );
      wrap.append(row);
    });
  }

  // Formulario para nuevo recordatorio
  let newText='', newDate='';
  const addRow = h('div',{style:{display:'flex',gap:'6px',flexWrap:'wrap',alignItems:'center'}});
  const textInp = h('input',{type:'text',placeholder:'Ej: Llamar para ver oferta...',style:{flex:'2',minWidth:'140px',fontSize:'13px'}});
  textInp.addEventListener('input',e=>newText=e.target.value);
  const dateInp = h('input',{type:'date',style:{flex:'1',minWidth:'130px',fontSize:'13px'}});
  dateInp.addEventListener('change',e=>newDate=e.target.value);
  const addBtn = h('button',{
    class:'btn btn-secondary btn-sm',
    onClick:()=>{
      if(!newText.trim()||!newDate){return;}
      const updated={...c,reminders:[...(c.reminders||[]),{text:newText.trim(),date:newDate}].sort((a,b)=>a.date>b.date?1:-1)};
      saveContact(updated);
    }
  },'+ Añadir');
  addRow.append(textInp, dateInp, addBtn);
  wrap.append(addRow);

  return sectionEl('Recordatorios', wrap);
}

// FILES SECTION
function renderFilesSection(cid) {
  const wrap = h('div',{class:'grid-stack'});
  let files = loadFiles(cid);

  function refresh() {
    wrap.innerHTML='';
    const topRow = h('div',{class:'flex',style:{justifyContent:'space-between',alignItems:'center'}});
    topRow.append(h('span',{style:{fontSize:'12px',color:'var(--text2)'}},files.length+' archivo'+(files.length!==1?'s':'')));
    const fileInput = h('input',{type:'file',style:{display:'none'},accept:'image/*,.pdf,.doc,.docx,.txt,.xls,.xlsx'});
    fileInput.addEventListener('change',e=>{
      const file=e.target.files?.[0];if(!file)return;
      if(file.size>3*1024*1024){alert('Máximo 3MB por archivo');return;}
      const reader=new FileReader();
      reader.onload=ev=>{
        const fid=genId();
        const meta={id:fid,name:file.name,type:file.type,size:Math.round(file.size/1024),uploadedAt:new Date().toISOString()};
        try{saveFile(cid,fid,ev.target.result);}catch(er){alert('Sin espacio para guardar el archivo. Intenta con uno más pequeño.');return;}
        files=[...files,meta];saveFiles(cid,files);refresh();
      };
      reader.readAsDataURL(file);
    });
    const addBtn=h('button',{class:'btn btn-primary btn-sm',onClick:()=>fileInput.click()},'+ Adjuntar');
    topRow.append(fileInput,addBtn);
    wrap.append(topRow);

    if(files.length>0) {
      const grid=h('div',{class:'files-grid'});
      files.forEach(f=>{
        const isImg=f.type?.startsWith('image/');
        const thumb=h('div',{class:'file-thumb'});
        if(isImg){
          const data=loadFile(cid,f.id);
          if(data){const img=h('img',{src:data,alt:f.name,title:f.name});img.addEventListener('click',()=>window.open(data,'_blank'));thumb.append(img);}
        } else {
          const doc=h('div',{class:'file-doc',title:f.name,onClick:()=>{const d=loadFile(cid,f.id);if(d){const a=document.createElement('a');a.href=d;a.download=f.name;a.click();}}});
          const icon=f.type?.includes('pdf')?'📄':f.type?.includes('word')||f.type?.includes('doc')?'📝':f.type?.includes('sheet')||f.type?.includes('excel')?'📊':'📎';
          doc.append(h('span',{style:{fontSize:'20px'}},icon));
          const info2=h('div',{});info2.append(h('div',{class:'file-name'},f.name));info2.append(h('div',{class:'file-size'},f.size+'kb'));
          doc.append(info2);thumb.append(doc);
        }
        const delBtn=h('button',{class:'file-del',title:'Eliminar',onClick:e=>{e.stopPropagation();delFile(cid,f.id);files=files.filter(x=>x.id!==f.id);saveFiles(cid,files);refresh();}},'×');
        thumb.append(delBtn);
        grid.append(thumb);
      });
      wrap.append(grid);
    }
  }
  refresh();
  return wrap;
}

function renderMergePanel(base) {
  const panel = h('div',{class:'merge-panel'});
  const hdr=h('div',{class:'flex',style:{justifyContent:'space-between',marginBottom:'10px'}});

  hdr.append(h('button',{class:'btn btn-secondary btn-sm',onClick:()=>setState({showMerge:false,mergeSelected:null,mergeSearch:''})},'Cancelar'));
  panel.append(hdr);
  const searchInp=h('input',{type:'text',value:state.mergeSearch,placeholder:'Buscar contacto para fusionar...'});
  panel.append(searchInp);

  const list=h('div',{class:'merge-list'});
  panel.append(list);

  const footer=h('div',{class:'flex',style:{justifyContent:'flex-end',gap:'8px',marginTop:'8px'}});
  const mergeBtn=h('button',{class:'btn btn-primary btn-sm',disabled:!state.mergeSelected,onClick:()=>{if(state.mergeSelected)mergeContacts(base,state.mergeSelected);}},'Fusionar →');
  footer.append(h('button',{class:'btn btn-secondary btn-sm',onClick:()=>setState({showMerge:false,mergeSelected:null,mergeSearch:''})},'Cancelar'),mergeBtn);
  panel.append(footer);

  function refreshList() {
    list.innerHTML='';
    const q=state.mergeSearch.toLowerCase();
    const others=state.contacts.filter(c=>c.id!==base.id&&(!q||c.name?.toLowerCase().includes(q)||c.phone?.includes(q)));
    if(others.length===0){list.append(h('div',{style:{fontSize:'12px',color:'var(--text3)',padding:'8px 0'}},'Sin resultados'));return;}
    others.forEach(c=>{
      const item=h('div',{class:'merge-item'+(state.mergeSelected?.id===c.id?' selected':'')});
      item.addEventListener('click',()=>{state.mergeSelected=state.mergeSelected?.id===c.id?null:c;mergeBtn.disabled=!state.mergeSelected;refreshList();});
      const av2=avatar(c.name,'sm');
      item.append(av2);
      const info=h('div',{class:'merge-item-info'});
      info.append(h('div',{class:'merge-item-name'},c.name||'Sin nombre'));
      info.append(h('div',{class:'merge-item-sub'},(c.phone||c.email||'Sin contacto')));
      item.append(info);
      list.append(item);
    });
  }
  searchInp.addEventListener('input',e=>{state.mergeSearch=e.target.value;refreshList();});
  refreshList();
  return panel;
}

// STATS VIEW
function renderStats() {
  const cs = state.contacts;
  const total=cs.length;
  const wrap=h('div',{});
  wrap.append(h('div',{class:'flex',style:{marginBottom:'16px'}},
    h('button',{class:'btn btn-secondary btn-sm',onClick:()=>setState({view:'list'})},'← Volver'),
    h('h2',{style:{marginLeft:'8px'}},'Estadísticas del CRM')
  ));

  const vip=cs.filter(c=>c.isVIP).length;
  const urgent=cs.filter(c=>c.urgency>=3).length;
  const mortgage=cs.filter(c=>c.needsMortgage).length;
  const pool=cs.filter(c=>c.wantsPool).length;
  const budgets=cs.filter(c=>c.budgetMax).map(c=>Number(c.budgetMax));
  const avgB=budgets.length?Math.round(budgets.reduce((a,b)=>a+b,0)/budgets.length):0;

  const sGrid=h('div',{class:'stats-grid'});
  const sc=(label,value,sub,color)=>{
    const el=h('div',{class:'stat-card'});
    el.append(h('div',{class:'stat-label'},label));
    el.append(h('div',{class:'stat-value',style:{color:color||'var(--text)'}},value||'0'));
    if(sub)el.append(h('div',{class:'stat-sub'},sub));
    return el;
  };
  sGrid.append(
    sc('Total contactos',total),
    sc('Clientes VIP',vip,total?Math.round(vip/total*100)+'% del total':'','var(--vip)'),
    sc('Alta urgencia',urgent,'','var(--danger)'),
    sc('Con hipoteca',mortgage),
    sc('Con piscina',pool),
    sc('Presup. medio',avgB?'€'+Math.round(avgB/1000)+'k':'—')
  );
  wrap.append(sGrid);

  const g2=h('div',{class:'grid-2',style:{gap:'12px'}});

  // By urgency
  const urgSec=sectionEl('Distribución por urgencia');
  [1,2,3].forEach(v=>{
    const n=cs.filter(c=>c.urgency===v).length;
    const urg=URGENCY[v];
    const row=h('div',{class:'bar-row'});
    row.append(h('div',{class:'bar-label'},urg.l));
    const track=h('div',{class:'bar-track'});
    const fill=h('div',{class:'bar-fill',style:{width:(total?n/total*100:0)+'%',background:urg.c}});
    track.append(fill);row.append(track);row.append(h('div',{class:'bar-num'},n));
    urgSec.append(row);
  });
  g2.append(urgSec);

  // Top zones
  const zoneCnt={};cs.forEach(c=>(c.searchZones||[]).forEach(z=>{zoneCnt[z]=(zoneCnt[z]||0)+1;}));
  const topZ=Object.entries(zoneCnt).sort((a,b)=>b[1]-a[1]).slice(0,6);
  const zoneSec=sectionEl('Top zonas de búsqueda');
  if(topZ.length===0) zoneSec.append(h('div',{style:{fontSize:'12px',color:'var(--text3)'}},'Sin datos'));
  const maxZ=topZ[0]?.[1]||1;
  topZ.forEach(([z,n])=>{
    const row=h('div',{class:'bar-row'});
    row.append(h('div',{class:'bar-label',style:{minWidth:'90px',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}},z));
    const track=h('div',{class:'bar-track'});
    const fill=h('div',{class:'bar-fill',style:{width:(n/maxZ*100)+'%',background:'var(--accent)'}});
    track.append(fill);row.append(track);row.append(h('div',{class:'bar-num'},n));
    zoneSec.append(row);
  });
  g2.append(zoneSec);

  // Tags
  const tagCnt={};cs.forEach(c=>(c.tags||[]).forEach(t=>{tagCnt[t]=(tagCnt[t]||0)+1;}));
  const topT=Object.entries(tagCnt).sort((a,b)=>b[1]-a[1]).slice(0,8);
  const tagSec=sectionEl('Etiquetas frecuentes');
  const tagWrap=h('div',{class:'flex-wrap gap-4'});
  if(topT.length===0)tagSec.append(h('div',{style:{fontSize:'12px',color:'var(--text3)'}},'Sin etiquetas'));
  topT.forEach(([t,n])=>tagWrap.append(chip(t+' ('+n+')','')));
  tagSec.append(tagWrap);
  g2.append(tagSec);

  // By agent
  const agentCnt={};cs.forEach(c=>{const a=c.createdBy||'Sin asignar';agentCnt[a]=(agentCnt[a]||0)+1;});
  const agentSec=sectionEl('Contactos por agente');
  Object.entries(agentCnt).sort((a,b)=>b[1]-a[1]).forEach(([a,n])=>{
    const row=h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',fontSize:'13px',gap:'8px'}});
    row.append(h('span',{style:{color:'var(--text2)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}},a));
    row.append(h('span',{style:{fontWeight:'600'}},n));
    agentSec.append(row);
  });
  g2.append(agentSec);

  wrap.append(g2);
  return wrap;
}

// LIST VIEW

  wrap.append(fbar);

  // Filtros rápidos (chips horizontales arriba)
  const fp=h('div',{class:'filter-panel'});
  fp.append(h('div',{class:'filter-panel-title'},'Filtros rápidos'));
  const chips=[
    ['★ Premium','hasPremium','active-vip'],
    ['🏊 Piscina','wantsPool','active'],
    ['Hipoteca','needsMortgage','active-warn'],
    ['💰 Tiene efectivo','hasEfectivo','active'],
    ['✅ Tiene NIE','hasNIE','active'],
    ['❌ Sin NIE','noNIE','active-warn'],
    ['Okupa OK','hasOkupa','active-warn'],
    ['🇬🇧 Habla inglés','hablaIngles','active'],
  ];

    const c=h('button',{class:'filter-chip'+(f[field]?' '+cls:''),onClick:()=>setState({filters:{...f,[field]:!f[field]}})},label);

  const zoneSel=h('select',{class:'sidebar-select'+(f.zone?' active':'')},
    h('option',{value:''},'Todas las zonas'),
    ...ZONE_SUGG.map(z=>h('option',{value:z},z))

  zoneSel.value=f.zone||'';
  zoneSel.addEventListener('change',e=>setState({filters:{...f,zone:e.target.value}}));

  [['','Todos'],...BUDGET_OPTS.slice(1).map(([v,l])=>[v,'Hasta '+l])].forEach(([v,l])=>{
    const o=h('option',{value:v},l);if(f.budgetMax===v)o.selected=true;budgetSel.append(o);

  budgetSel.addEventListener('change',e=>setState({filters:{...f,budgetMax:e.target.value}}));

  // Etiqueta

  tagSection.append(h('span',{class:'sidebar-section-label'},'Etiqueta'));

    h('option',{value:''},'Todas'),
    ...TAG_SUGG.map(t=>h('option',{value:t},t))
  );
  tagSel.value=f.tag||'';
  tagSel.addEventListener('change',e=>setState({filters:{...f,tag:e.target.value}}));
  tagSection.append(tagSel);
  sidebar.append(tagSection);

  // Urgencia
  const urgSection=h('div',{class:'sidebar-section'});
  urgSection.append(h('span',{class:'sidebar-section-label'},'Urgencia'));
  const urgSel=h('select',{class:'sidebar-select'+(f.urgencyMin>0?' active':'')},
    h('option',{value:'0'},'Todas'),
    ...[1,2,3].map(v=>h('option',{value:String(v)},URGENCY[v].l+' o más'))
  );
  urgSel.value=String(f.urgencyMin);
  urgSel.addEventListener('change',e=>setState({filters:{...f,urgencyMin:Number(e.target.value)}}));
  urgSection.append(urgSel);
  sidebar.append(urgSection);

  // Dormitorios
  const bedsSection=h('div',{class:'sidebar-section'});
  bedsSection.append(h('span',{class:'sidebar-section-label'},'Dormitorios mín.'));
  const bedsSideSel=h('select',{class:'sidebar-select'+(f.bedroomsMin?' active':'')},
    h('option',{value:''},'Todos'),
    ...[1,2,3,4].map(v=>h('option',{value:String(v)},v+'+ hab.'))
  );

  bedsSideSel.addEventListener('change',e=>setState({filters:{...f,bedroomsMin:e.target.value}}));
  bedsSection.append(bedsSideSel);

  // Limpiar
  if(af>0){
    sidebar.append(h('hr',{class:'sidebar-divider'}));

    const chip2=h('div',{style:{display:'flex',alignItems:'center',gap:'4px',background:'#fff',border:'1.5px solid #c4b5fd',borderRadius:'20px',padding:'3px 8px',fontSize:'11px',fontWeight:'600',color:'#6d28d9',cursor:'pointer'}},t);
    chip2.append(h('span',{onClick:()=>setState({filters:{...f,tags:f.tags.filter(x=>x!==t)}})},{style:{fontWeight:'700',marginLeft:'2px'}}));
    chip2.lastChild.textContent='×';
    chip2.lastChild.style.cssText='font-weight:700;margin-left:2px;cursor:pointer;';
    chip2.addEventListener('click',()=>setState({filters:{...f,tags:f.tags.filter(x=>x!==t)}}));

    }

  } else {
    const list=h('div',{class:'contact-list'});
    filtered.forEach((c,i)=>list.append(renderCard(c,i)));

  }
  layout.append(main);
  wrap.append(layout);
  return wrap;

// ─── SHEETS CONFIG VIEW ───────────────────────────────────────────────────────
function renderSheetsConfig() {
  const wrap = h('div',{});
  wrap.append(h('div',{class:'flex',style:{marginBottom:'16px'}},
    h('button',{class:'btn btn-secondary btn-sm',onClick:()=>setState({view:'list'})},'← Volver'),
    h('h2',{style:{marginLeft:'8px'}},'Conectar Google Sheets')
  ));

  const currentUrl = LS.get('crm_sheets_url') || '';

  const card = h('div',{class:'card',style:{maxWidth:'600px'}});

  if(currentUrl) {
    card.append(h('div',{style:{padding:'10px 14px',background:'var(--success-bg)',border:'1px solid var(--success-border)',borderRadius:'var(--radius-sm)',marginBottom:'14px',fontSize:'13px',color:'var(--success)'}},
      '🟢 Google Sheets conectado y funcionando. Los cambios se sincronizan automáticamente.'
    ));
  }

  card.append(h('div',{class:'section-title'},'URL de tu Web App'));

  if(IS_APPS_SCRIPT) {
    card.append(h('div',{style:{padding:'10px 14px',background:'var(--success-bg)',border:'1px solid var(--success-border)',borderRadius:'var(--radius-sm)',fontSize:'13px',color:'var(--success)'}},
      '✅ Estás usando el CRM directamente desde Google Apps Script. La conexión con Sheets es automática, no necesitás configurar nada.'
    ));
  } else {

  const urlInp = h('input',{type:'url', value:currentUrl, placeholder:'https://script.google.com/macros/s/AKfycb.../exec', style:{marginBottom:'10px'}});

  const saveBtn = h('button',{class:'btn btn-primary', onClick:async()=>{
    const url = urlInp.value.trim();
    if(!url){ showToast('Pegá la URL primero','danger'); return; }
    LS.set('crm_sheets_url', url);
    SHEETS_URL = url;
    saveBtn.textContent = 'Probando conexión...';
    saveBtn.disabled = true;
    const data = await API.getAll();
    if(data && Array.isArray(data)) {
      saveContacts(data);
      setState({ contacts: data, sheetsConfigured: true, view:'list' });
      showToast('✅ Sheets conectado — '+data.length+' contactos cargados');
    } else {
      saveBtn.textContent = 'Guardar URL';
      saveBtn.disabled = false;
      showToast('❌ No se pudo conectar. Revisá la URL y que esté publicada como "Cualquiera"','danger');
    }
  }},'Guardar y probar conexión');

  card.append(urlInp, saveBtn);

  if(currentUrl) {
    const disconnectBtn = h('button',{class:'btn btn-danger btn-sm',style:{marginLeft:'8px'},onClick:()=>{
      LS.del('crm_sheets_url');
      SHEETS_URL='';
      setState({sheetsConfigured:false, view:'list'});
      showToast('Sheets desconectado','danger');
    }},'Desconectar');
    card.append(disconnectBtn);
  }

  } // fin else IS_APPS_SCRIPT

  // Instrucciones paso a paso
  card.append(h('div',{class:'section-title',style:{marginTop:'20px'}},'Cómo configurarlo (5 pasos)'));
  const steps = [
    ['1. Crear la Sheet','Abrí Google Drive → Nuevo → Google Sheets. Ponele el nombre "CRM Inmobiliario" (o el que quieras).'],
    ['2. Abrir Apps Script','Dentro de la Sheet: menú Extensiones → Apps Script. Se abre el editor de código.'],
    ['3. Pegar el script','Borrá todo lo que hay en el editor y pegá el contenido del archivo crm_apps_script.js que descargaste junto a este HTML.'],
    ['4. Ejecutar setup()','En el editor, seleccioná la función "setup" en el desplegable y hacé clic en ▶ Ejecutar. Te va a pedir permisos — aceptá todos. Esto crea las pestañas y la carpeta en Drive.'],
    ['5. Publicar como Web App','En el editor: Implementar → Nueva implementación → Tipo: "Aplicación web" → Ejecutar como: "Yo" → Quién tiene acceso: "Cualquiera". Hacé clic en Implementar. Copiá la URL que termina en /exec y pegala arriba.'],
  ];
  steps.forEach(([title, desc])=>{
    const step = h('div',{style:{marginBottom:'12px',fontSize:'13px'}});
    step.append(h('div',{style:{fontWeight:'600',marginBottom:'3px'}},title));
    step.append(h('div',{style:{color:'var(--text2)',lineHeight:'1.6'}},desc));
    card.append(step);
  });

  card.append(h('div',{style:{marginTop:'14px',padding:'10px 12px',background:'var(--warn-bg)',border:'1px solid var(--warn-border)',borderRadius:'var(--radius-sm)',fontSize:'12px',color:'var(--warn)'}},
    '⚠️ Importante: en el paso 5, "Quién tiene acceso" debe ser "Cualquiera" (sin iniciar sesión) para que el CRM pueda comunicarse con la Sheet. Los datos no son públicos — la URL actúa como contraseña.'
  ));

  // ── Sección cambio de contraseña ──
  card.append(h('div',{class:'section-title',style:{marginTop:'24px'}},'Cambiar credenciales de acceso'));
  card.append(h('p',{style:{fontSize:'13px',color:'var(--text2)',marginBottom:'10px'}},
    'Cambiá el usuario y contraseña con los que entrás al CRM. Se guarda en este dispositivo.'
  ));
  const creds = AUTH.getCredentials();
  const newUserInp = h('input',{type:'text', value:creds.user, placeholder:'Nuevo usuario', style:{marginBottom:'8px'}});
  const newPassInp = h('input',{type:'password', value:'', placeholder:'Nueva contraseña', style:{marginBottom:'8px'}});
  const newPass2Inp = h('input',{type:'password', value:'', placeholder:'Repetir contraseña', style:{marginBottom:'10px'}});
  const saveCredsBtn = h('button',{class:'btn btn-secondary', onClick:()=>{
    const u = newUserInp.value.trim();
    const p = newPassInp.value;
    const p2 = newPass2Inp.value;
    if(!u) { showToast('El usuario no puede estar vacío','danger'); return; }
    if(p.length < 4) { showToast('La contraseña debe tener al menos 4 caracteres','danger'); return; }
    if(p !== p2) { showToast('Las contraseñas no coinciden','danger'); return; }
    AUTH.setCredentials(u, p);
    showToast('Credenciales actualizadas ✓');
  }},'Guardar credenciales');
  card.append(newUserInp, newPassInp, newPass2Inp, saveCredsBtn);

  // ── Cerrar sesión ──
  card.append(h('div',{class:'section-title',style:{marginTop:'24px'}},'Sesión'));
  const logoutBtn = h('button',{class:'btn btn-danger btn-sm', onClick:()=>{
    AUTH.logout();
    showLoginScreen();
  }},'Cerrar sesión');
  card.append(logoutBtn);

  wrap.append(card);
  return wrap;
}

// ─── RENDER ───────────────────────────────────────────────────────────────────
function render() {
  const app=document.getElementById('app');
  app.innerHTML='';
  if(state.toast) {
    app.append(h('div',{class:'toast toast-'+state.toast.type},state.toast.msg));
  }
  if(state.view==='list') app.append(renderList());
  else if(state.view==='form') app.append(renderForm());
  else if(state.view==='detail') app.append(renderDetail());
  else if(state.view==='stats') app.append(renderStats());
  else if(state.view==='sheets_config') app.append(renderSheetsConfig());
}

// ─── ARRANQUE ─────────────────────────────────────────────────────────────────
function init() {
  if (AUTH.isLoggedIn()) {
    render();
    if (SHEETS_URL) syncFromSheets();
  } else {
    showLoginScreen();
  }
}

if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', init);
} else {
  init();
}


</script>
